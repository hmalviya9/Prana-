<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prana Atlas — Interactive Energy Body</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#040810;--panel:rgba(5,10,22,0.97);--glass:rgba(255,255,255,0.025);--border:rgba(80,130,255,0.11);--border2:rgba(80,130,255,0.22);--t1:#dce8ff;--t2:#8aa0cc;--t3:#4a6090}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:'Manrope',system-ui,sans-serif;font-size:13px;color:var(--t1);display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(80,130,255,0.22);border-radius:2px}
/* HEADER */
#hdr{display:flex;align-items:center;gap:11px;padding:0 16px;height:48px;flex-shrink:0;background:rgba(3,7,17,0.99);border-bottom:1px solid var(--border);z-index:50;position:relative}
.logo{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:#8aadff;letter-spacing:.05em;white-space:nowrap}.logo em{color:#b080ff;font-style:normal}
.gwrap{display:flex;gap:3px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:3px}
.gbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;font-weight:500;padding:4px 11px;border-radius:14px;font-family:'Manrope',sans-serif;transition:all .2s}
.gbtn.on{background:rgba(100,150,255,0.18);color:var(--t1)}
#srch{flex:1;max-width:240px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;color:var(--t1);font-size:12px;padding:6px 14px;outline:none;font-family:'Manrope',sans-serif;transition:border-color .2s}
#srch::placeholder{color:var(--t3)}#srch:focus{border-color:var(--border2)}
.hs{flex:1}
/* MODE NAV */
#modenav{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:3px}
.mnbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:10px;font-weight:500;padding:4px 10px;border-radius:14px;font-family:'Manrope',sans-serif;transition:all .2s;white-space:nowrap}
.mnbtn.on{background:rgba(100,150,255,0.2);color:var(--t1)}
/* MAIN */
#main{display:flex;height:calc(100vh - 48px);overflow:hidden}
/* LEFT PANEL */
#lp{width:210px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:14px}
.psec h4{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
/* layer toggles */
.li{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer;padding:5px 6px;border-radius:7px;transition:background .15s}
.li:hover{background:rgba(255,255,255,0.025)}.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.llbl{font-size:11px;color:var(--t3);flex:1}
.li.on .llbl{color:var(--t2)}.lsw{width:26px;height:14px;background:rgba(255,255,255,0.07);border-radius:7px;position:relative;flex-shrink:0;transition:background .2s}
.lsw::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:var(--t3);top:2px;left:2px;transition:all .2s}
.li.on .lsw{background:rgba(80,140,255,0.32)}.li.on .lsw::after{background:#80b8ff;left:14px}
/* vayu items */
.vi{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:rgba(255,255,255,0.02);border:1px solid transparent;transition:all .2s}
.vi:hover{background:rgba(80,120,255,0.06);border-color:rgba(80,120,255,0.14)}.vi.on{background:rgba(80,120,255,0.1);border-color:rgba(80,120,255,0.24)}
.vdot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}.vn{font-size:11px;font-weight:500;color:var(--t2);line-height:1.3}.vr{font-size:10px;color:var(--t3);margin-top:1px}
/* journey/condition/food list items */
.ji{padding:8px 9px;border-radius:8px;border:1px solid rgba(90,70,210,0.17);background:rgba(60,45,170,0.04);cursor:pointer;margin-bottom:5px;transition:all .2s}
.ji:hover,.ji.on{background:rgba(60,45,170,0.14);border-color:rgba(110,90,255,0.32)}.jit{font-size:11px;font-weight:500;color:rgba(160,140,255,0.85);margin-bottom:2px}.jid{font-size:10px;color:var(--t3);line-height:1.4}
.ci{padding:8px 9px;border-radius:8px;border:1px solid rgba(255,80,80,0.15);background:rgba(200,40,40,0.04);cursor:pointer;margin-bottom:5px;transition:all .2s}
.ci:hover,.ci.on{background:rgba(200,40,40,0.1);border-color:rgba(255,80,80,0.28)}.cit{font-size:11px;font-weight:500;margin-bottom:2px}.cid{font-size:10px;color:var(--t3);line-height:1.4}
.ccat{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 5px;padding-left:2px}
.di{padding:8px 9px;border-radius:8px;cursor:pointer;margin-bottom:5px;border:1px solid rgba(80,200,120,0.15);background:rgba(40,150,80,0.04);transition:all .2s}
.di:hover,.di.on{background:rgba(40,150,80,0.12);border-color:rgba(80,200,120,0.3)}.dit{font-size:11px;font-weight:500;color:rgba(100,220,150,0.85);margin-bottom:2px}.did{font-size:10px;color:var(--t3)}
.mi{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:8px;cursor:pointer;margin-bottom:5px;border:1px solid rgba(180,130,255,0.15);background:rgba(120,80,200,0.04);transition:all .2s}
.mi:hover,.mi.on{background:rgba(120,80,200,0.14);border-color:rgba(180,130,255,0.3)}
.msym2{font-family:'Cinzel',serif;font-size:18px;font-weight:400;width:32px;text-align:center;flex-shrink:0}
.minfo{flex:1}.mname{font-size:11px;font-weight:500;color:var(--t2)}.mhz2{font-size:10px;color:var(--t3)}
.fi{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .2s}
.fi:hover,.fi.on{background:rgba(255,255,255,0.04);border-color:var(--border)}
.fbadge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ftxt{flex:1}.fn{font-size:11px;font-weight:500;color:var(--t2)}.fq{font-size:9px;color:var(--t3)}
/* VIEWER */
#viewer{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(ellipse 60% 75% at 50% 44%,rgba(14,26,65,0.75) 0%,var(--bg0) 72%)}
#bwrap{position:relative;width:240px;height:480px;flex-shrink:0}
#pc{position:absolute;top:0;left:0;width:240px;height:480px;z-index:1;pointer-events:none}
#mc{position:absolute;top:0;left:0;width:240px;height:480px;z-index:3;pointer-events:none;display:none}
#bsvg{position:relative;z-index:2;width:240px;height:480px;overflow:visible}
/* viewer overlay panels */
#mantracenter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(5,10,25,0.94);border:1px solid rgba(120,90,255,0.25);border-radius:14px;padding:12px 18px;display:none;z-index:10;text-align:center;min-width:220px}
.mctitle{font-family:'Cinzel',serif;font-size:22px;margin-bottom:4px}
.mcsub{font-size:10px;color:var(--t3);margin-bottom:10px}
.playbtn{background:rgba(120,90,255,0.2);border:1px solid rgba(150,120,255,0.35);border-radius:20px;color:#c0a8ff;cursor:pointer;font-size:12px;padding:7px 18px;font-family:'Manrope',sans-serif;transition:all .2s}
.playbtn:hover{background:rgba(120,90,255,0.36);color:#d8c8ff}
.playbar{height:3px;background:rgba(120,90,255,0.15);border-radius:2px;margin-top:10px;overflow:hidden}
.playbarfill{height:100%;width:0%;background:linear-gradient(90deg,#8855ff,#cc88ff);transition:width .1s;border-radius:2px}
#tip{position:absolute;background:rgba(4,9,26,0.97);border:1px solid rgba(100,150,255,0.26);border-radius:9px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:100;display:none;max-width:165px}
.tn{font-family:'Cinzel',serif;font-weight:600;color:#c0d8ff;margin-bottom:2px;font-size:12px}.ts{color:var(--t3);font-size:10px}
#sdrop{position:fixed;top:48px;left:50%;transform:translateX(-50%);background:rgba(4,9,26,0.98);border:1px solid var(--border2);border-radius:12px;padding:8px;width:340px;display:none;z-index:300;max-height:240px;overflow-y:auto;box-shadow:0 20px 55px rgba(0,0,50,0.55)}
.sri{padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .12s;margin-bottom:2px}.sri:hover{background:rgba(80,120,255,0.1)}
.srin{font-size:12px;font-weight:500;color:#b0c8ff;display:flex;align-items:center;gap:7px}.srsub{font-size:10px;color:var(--t3);margin-top:2px}
/* DETAIL PANEL */
#dp{width:0;flex-shrink:0;overflow:hidden;transition:width .33s cubic-bezier(.4,0,.2,1)}
#dp.open{width:300px}
#dpi{width:300px;height:100%;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#dhdr{padding:12px 13px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
#dcl{float:right;background:none;border:none;color:var(--t3);cursor:pointer;font-size:20px;line-height:1;padding:0;transition:color .2s}
#dcl:hover{color:var(--t1)}
#dco{width:28px;height:28px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:9px}
.dname{display:inline-block;vertical-align:middle;font-family:'Cinzel',serif;font-size:13px;color:#c0d8ff}
.dsub{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.5}
#dtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.dt{flex:1;background:none;border:none;color:var(--t3);cursor:pointer;font-size:10px;font-weight:600;padding:9px 4px;text-align:center;border-bottom:2px solid transparent;transition:all .17s;text-transform:uppercase;letter-spacing:.07em;font-family:'Manrope',sans-serif}
.dt.on{color:#8aadff;border-bottom-color:#5070d0}
#dcon{flex:1;overflow-y:auto;padding:13px}
/* detail content */
.ib{margin-bottom:13px}.ib h5{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}.ib p{font-size:11px;color:var(--t2);line-height:1.65}
.chip{display:inline-block;background:rgba(70,95,195,0.11);border:1px solid rgba(80,120,255,0.18);border-radius:10px;font-size:10px;color:#8aabe0;padding:3px 9px;margin:2px 3px 2px 0}
.chipg{display:inline-block;background:rgba(35,170,115,0.1);border:1px solid rgba(40,195,135,0.18);border-radius:10px;font-size:10px;color:#70c8a8;padding:3px 9px;margin:2px 3px 2px 0}
.chipo{display:inline-block;background:rgba(200,100,30,0.1);border:1px solid rgba(220,130,40,0.2);border-radius:10px;font-size:10px;color:#d4a060;padding:3px 9px;margin:2px 3px 2px 0}
.co{display:flex;gap:8px;align-items:flex-start;padding:9px;background:var(--glass);border:1px solid var(--border);border-radius:8px;margin-bottom:7px}
.csv{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:32px}
.cn{font-size:11px;font-weight:500;color:#b0c8e8;margin-bottom:3px}.cd{font-size:10px;color:var(--t3);line-height:1.55}.cd span{color:#4a7080}
.ab{background:var(--glass);border-radius:8px;padding:9px;margin-bottom:5px;border-left:2.5px solid}
.ab.ov{border-left-color:rgba(255,80,65,0.5)}.ab.un{border-left-color:rgba(65,125,255,0.5)}.ab.gr{border-left-color:rgba(50,200,120,0.5)}.ab.go{border-left-color:rgba(255,200,50,0.5)}
.abt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.ab.ov .abt{color:rgba(255,110,90,0.72)}.ab.un .abt{color:rgba(75,145,255,0.72)}.ab.gr .abt{color:rgba(60,210,130,0.72)}.ab.go .abt{color:rgba(255,210,60,0.72)}
.al{list-style:none}.al li{font-size:10px;color:var(--t3);padding:1px 0 1px 11px;position:relative}.al li::before{content:'·';position:absolute;left:2px}
.hi{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px}
.hico{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(80,100,200,0.1)}
.htxt{font-size:11px;color:var(--t2);line-height:1.55;padding-top:2px}.hlbl{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:1px}
.mb{text-align:center;padding:14px;background:var(--glass);border-radius:10px;margin-bottom:12px;border:1px solid}
.msym{font-family:'Cinzel',serif;font-size:32px;font-weight:400;letter-spacing:.1em;line-height:1.2}.mhz{font-size:10px;color:var(--t3);margin-top:5px}
.vf{height:50px;background:var(--glass);border:1px solid var(--border);border-radius:8px;margin-bottom:9px;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* chakra step bubble */
.stepbubble{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s}
.stepbubble:hover{background:rgba(255,255,255,0.03)}.stepbubble.on{border-color:rgba(150,120,255,0.3);background:rgba(100,80,200,0.08)}
.sbdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.sbtext{flex:1}
.sbname{font-size:11px;font-weight:500;color:var(--t2)}.sbsub{font-size:10px;color:var(--t3);line-height:1.4;margin-top:1px}
/* food card */
.fcard{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.fitem{padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--glass)}
.finame{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:3px}.fidesc{font-size:10px;color:var(--t3);line-height:1.45}
/* diet effects grid */
.deffect{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;align-items:center;margin-bottom:10px}
.dck{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:5px}
.dbar{height:6px;border-radius:3px;transition:width .5s}
.dbarwrap{background:rgba(255,255,255,0.06);border-radius:3px;height:6px;overflow:hidden;flex:1}
/* JOURNEY OVERLAY */
#jov{position:fixed;inset:0;background:rgba(2,4,13,0.92);z-index:500;display:none;align-items:center;justify-content:center}
#jov.vis{display:flex}
.jcard{background:rgba(6,11,28,0.99);border:1px solid rgba(90,130,255,0.18);border-radius:18px;padding:26px 27px;max-width:460px;width:90%;box-shadow:0 28px 75px rgba(0,0,80,0.48)}
.jstep{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.jtitle{font-family:'Cinzel',serif;font-size:17px;color:#c0d8ff;margin-bottom:10px;line-height:1.3}
.jtext{font-size:12px;color:#6a8098;line-height:1.78;margin-bottom:20px}
.jnav{display:flex;gap:8px;justify-content:flex-end}
.jnav button{background:rgba(75,95,255,0.11);border:1px solid rgba(75,95,255,0.23);border-radius:18px;color:#9ab0ff;cursor:pointer;font-size:11px;padding:6px 17px;font-family:'Manrope',sans-serif;transition:all .2s}
.jnav button:hover{background:rgba(75,95,255,0.26)}.jnav .jcl{background:none;border-color:rgba(75,95,200,0.13);color:var(--t3)}
.prog{display:flex;gap:5px;margin-bottom:15px;align-items:center}
.pdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all .3s;flex-shrink:0}
.pdot.on{box-shadow:0 0 6px var(--jc,#8aadff)}
/* sound progress ring */
@keyframes progring{from{stroke-dashoffset:283}to{stroke-dashoffset:0}}
</style>
</head>
<body>
<header id="hdr">
  <div class="logo">⬡ Prana <em>Atlas</em></div>
  <div class="gwrap">
    <button class="gbtn on" id="bm" onclick="setGender('male')">♂ Male</button>
    <button class="gbtn" id="bf" onclick="setGender('female')">♀ Female</button>
  </div>
  <input type="text" id="srch" placeholder="Search symptoms, conditions, foods…" oninput="doSearch(this.value)">
  <div class="hs"></div>
  <div id="modenav">
    <button class="mnbtn on" onclick="setMode('body')">🧬 Body</button>
    <button class="mnbtn" onclick="setMode('conditions')">🩺 Conditions</button>
    <button class="mnbtn" onclick="setMode('diet')">🥗 Diet</button>
    <button class="mnbtn" onclick="setMode('mantras')">🔔 Mantras</button>
    <button class="mnbtn" onclick="setMode('foods')">🌿 Foods</button>
  </div>
</header>
<div id="main">
  <aside id="lp">
    <div id="lp-body">
      <div class="psec"><h4>Visualization Layers</h4><div id="layerList"></div></div>
      <div class="psec"><h4>Prana Vayus</h4><div id="vayuList"></div></div>
      <div class="psec"><h4>Guided Journeys</h4><div id="jList"></div></div>
    </div>
    <div id="lp-conditions" style="display:none">
      <div class="psec"><h4>Medical Condition Journeys</h4><div id="condList"></div></div>
    </div>
    <div id="lp-diet" style="display:none">
      <div class="psec"><h4>Dietary Disciplines</h4><div id="dietList"></div></div>
    </div>
    <div id="lp-mantras" style="display:none">
      <div class="psec"><h4>Chakra Mantras</h4><div id="mantraList"></div></div>
    </div>
    <div id="lp-foods" style="display:none">
      <div class="psec"><h4>Prana Foods Atlas</h4><div id="foodList"></div></div>
    </div>
  </aside>
  <section id="viewer">
    <div id="bwrap">
      <canvas id="pc" width="240" height="480"></canvas>
      <canvas id="mc" width="240" height="480"></canvas>
      <svg id="bsvg" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="mantracenter">
      <div class="mctitle" id="mc-sym"></div>
      <div class="mcsub" id="mc-sub"></div>
      <button class="playbtn" id="mc-play" onclick="playMantra()">▶ Sound the Mantra</button>
      <div class="playbar"><div class="playbarfill" id="mc-fill"></div></div>
    </div>
    <div id="tip"><div class="tn" id="ttn"></div><div class="ts" id="tts"></div></div>
  </section>
  <aside id="dp">
    <div id="dpi">
      <div id="dhdr">
        <button id="dcl" onclick="closeDetail()">×</button>
        <span id="dco"></span><span class="dname" id="dname"></span>
        <div class="dsub" id="dsub"></div>
      </div>
      <div id="dtabs">
        <button class="dt on" data-tab="prana" onclick="switchTab('prana')">Prana</button>
        <button class="dt" data-tab="hormones" onclick="switchTab('hormones')">Hormones</button>
        <button class="dt" data-tab="conditions" onclick="switchTab('conditions')">Conditions</button>
        <button class="dt" data-tab="healing" onclick="switchTab('healing')">Healing</button>
      </div>
      <div id="dcon"></div>
    </div>
  </aside>
</div>
<div id="sdrop"></div>
<div id="jov">
  <div class="jcard" id="jcard">
    <div class="prog" id="jprog"></div>
    <div class="jstep" id="jstep"></div>
    <div class="jtitle" id="jtitle"></div>
    <div class="jtext" id="jtext"></div>
    <div class="jnav">
      <button class="jcl" onclick="closeJourney()">✕ Close</button>
      <button id="jprev" onclick="jPrev()" style="display:none">← Prev</button>
      <button id="jnext" onclick="jNext()">Next →</button>
    </div>
  </div>
</div>
<script>

function rebuildSVG(){
  const svg=document.getElementById('bsvg');
  const blockedIds=S.mode==='conditions'&&S.selCond?CONDITIONS.find(c=>c.id===S.selCond)?.affected||[]:[];
  let h=`<defs>
    <filter id="gs"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gm"><feGaussianBlur stdDeviation="5.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg" cx="50%" cy="42%" r="52%"><stop offset="0%" stop-color="rgba(16,30,72,0.75)"/><stop offset="100%" stop-color="rgba(4,7,20,0)"/></radialGradient>
  </defs><ellipse cx="120" cy="242" rx="108" ry="215" fill="url(#bg)"/>`;
  h+=buildSilhouette();
  if(S.layers.has('organs'))h+=buildOrgans();
  if(S.layers.has('nadis'))h+=buildNadis();
  if(S.layers.has('vayus'))h+=buildVayus();
  if(S.layers.has('blockage')||blockedIds.length)h+=buildHeatmap(blockedIds);
  if(S.mode==='diet'&&S.selDiet)h+=buildDietOverlay();
  if(S.layers.has('chakra')||S.mode!=='body')h+=buildChakras(blockedIds);
  if(S.layers.has('hormones'))h+=buildEndocrine();
  if(S.gender==='female')h+=buildFemale();
  svg.innerHTML=h;
  CK.forEach(c=>{
    const el=document.getElementById('ck-'+c.id);
    if(!el)return;
    el.addEventListener('click',()=>onChakraClick(c.id));
    el.addEventListener('mouseenter',e=>showTip(e,c));
    el.addEventListener('mouseleave',hideTip);
  });
}

const cvs=document.getElementById('pc'),ctx=cvs.getContext('2d');
const mcanvas=document.getElementById('mc'),mctx=mcanvas.getContext('2d');
function initP(){
  S.particles=[];
  if(!S.layers.has('nadis')&&S.mode==='body')return;
  for(let i=0;i<22;i++)S.particles.push({t:Math.random(),sp:0.0013+Math.random()*0.0009,path:'su',sz:1.3+Math.random()*1.4,c:`rgba(${155+~~(Math.random()*65)},${105+~~(Math.random()*55)},255,${0.44+Math.random()*0.4})`});
  for(let i=0;i<13;i++)S.particles.push({t:Math.random(),sp:0.0011+Math.random()*0.0007,path:'id',sz:1.1+Math.random()*1.1,c:`rgba(${55+~~(Math.random()*60)},${145+~~(Math.random()*70)},255,${0.36+Math.random()*0.38})`});
  for(let i=0;i<13;i++)S.particles.push({t:Math.random(),sp:0.0011+Math.random()*0.0007,path:'pi',sz:1.1+Math.random()*1.1,c:`rgba(255,${135+~~(Math.random()*80)},${12+~~(Math.random()*36)},${0.36+Math.random()*0.38})`});
}
function ppos(p){
  const t=p.t;
  if(p.path==='su')return{x:120,y:300-t*280};
  if(p.path==='id'){const y=300-t*280;return{x:120-18*Math.sin(t*Math.PI*5.2),y};}
  const y=300-t*280;return{x:120+18*Math.sin(t*Math.PI*5.2),y};
}

let mRings=[];
function initMantraRings(cx,cy,color){
  mRings=[];
  for(let i=0;i<5;i++)mRings.push({r:8+i*10,maxR:30+i*18,alpha:0.7-i*0.12,sp:0.008+i*0.003,t:i*0.2,color});
}

function tick(){
  ctx.clearRect(0,0,240,480);
  const showParticles=S.layers.has('nadis');
  if(showParticles){
    S.particles.forEach(p=>{
      p.t+=p.sp;if(p.t>1)p.t=0;
      const{x,y}=ppos(p);
      ctx.beginPath();ctx.arc(x,y,p.sz,0,Math.PI*2);ctx.fillStyle=p.c;ctx.fill();
      ctx.beginPath();ctx.arc(x,y,p.sz*2.8,0,Math.PI*2);ctx.fillStyle=p.c.replace(/[\d.]+\)$/,'0.1)');ctx.fill();
    });
  }
  // mantra rings
  if(S.mode==='mantras'&&mRings.length){
    const ck=CK.find(c=>c.id===S.selMantra);
    if(ck){
      mctx.clearRect(0,0,240,480);
      mRings.forEach(ring=>{
        ring.t+=ring.sp;
        const r=ring.r+(ring.maxR-ring.r)*((Math.sin(ring.t)+1)/2);
        const alpha=ring.alpha*(1-ring.t/(Math.PI*4));
        if(ring.t>Math.PI*4){ring.t=0;}
        mctx.beginPath();mctx.arc(ck.cx,ck.cy,r,0,Math.PI*2);
        mctx.strokeStyle=ring.color.replace(')',`,${Math.max(0,alpha)})`).replace('rgb','rgba').replace('rgba(rgba','rgba');
        mctx.lineWidth=1.2;mctx.stroke();
      });
    }
  }else{mctx.clearRect(0,0,240,480);}
  S.raf=requestAnimationFrame(tick);
}

function onChakraClick(id){
  if(S.mode==='body'){openDetail(id);}
  else if(S.mode==='mantras'){selectMantra(id);}
  else if(S.mode==='conditions'&&S.selCond){showCondStepForChakra(id);}
  else{openDetail(id);}
}

function openDetail(id){
  S.sel=id;const c=CK.find(x=>x.id===id);
  document.getElementById('dp').classList.add('open');
  const co=document.getElementById('dco');
  co.style.background=c.color;co.style.boxShadow=`0 0 12px ${c.glow}`;
  document.getElementById('dname').textContent=`${c.name} · ${c.eng}`;
  document.getElementById('dsub').innerHTML=`<b style="color:${c.color}">${c.el}</b> · ${c.mantra} · ${c.hz} Hz · ${c.zone}`;
  // show standard 4 tabs
  document.getElementById('dtabs').innerHTML=`<button class="dt on" data-tab="prana" onclick="switchTab('prana')">Prana</button><button class="dt" data-tab="hormones" onclick="switchTab('hormones')">Hormones</button><button class="dt" data-tab="conditions" onclick="switchTab('conditions')">Conditions</button><button class="dt" data-tab="healing" onclick="switchTab('healing')">Healing</button>`;
  renderTab(c,S.tab);rebuildSVG();
}

function switchTab(tab){

function playMantra(){
  if(S.mantraPlaying)return;
  const ck=CK.find(c=>c.id===S.selMantra);
  if(!ck)return;
  S.mantraPlaying=true;
  const btn=document.getElementById('mc-play');
  btn.textContent='♪ Sounding…';btn.style.opacity='0.6';
  if(!S.audioCtx)S.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ac=S.audioCtx;
  const osc=ac.createOscillator();
  const gain=ac.createGain();
  const osc2=ac.createOscillator();
  const gain2=ac.createGain();
  osc.connect(gain);gain.connect(ac.destination);
  osc2.connect(gain2);gain2.connect(ac.destination);
  osc.frequency.setValueAtTime(ck.hz,ac.currentTime);
  osc2.frequency.setValueAtTime(ck.hz*1.5,ac.currentTime);
  osc.type='sine';osc2.type='sine';
  gain.gain.setValueAtTime(0,ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.22,ac.currentTime+0.5);
  gain.gain.setValueAtTime(0.22,ac.currentTime+3);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+5);
  gain2.gain.setValueAtTime(0,ac.currentTime);
  gain2.gain.linearRampToValueAtTime(0.08,ac.currentTime+0.5);
  gain2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+5);
  osc.start();osc2.start();
  osc.stop(ac.currentTime+5.2);osc2.stop(ac.currentTime+5.2);
  // animate bar
  let start=Date.now();
  const fill=document.getElementById('mc-fill');
  const anim=()=>{const p=Math.min(100,(Date.now()-start)/5000*100);fill.style.width=p+'%';if(p<100)requestAnimationFrame(anim);};anim();
  setTimeout(()=>{S.mantraPlaying=false;btn.textContent='▶ Sound the Mantra';btn.style.opacity='1';fill.style.width='0%';},5200);
}

function doSearch(term){
  const drop=document.getElementById('sdrop');
  if(!term.trim()){drop.style.display='none';return;}
  const q=term.toLowerCase();
  const res=CK.map(c=>{
    const blob=[c.name,c.eng,c.zone,c.gland,...c.hormones,...c.organs,c.pdesc,...c.un.phys,...c.un.psych,...c.ov.phys,...c.conds.map(x=>x.name),...c.conds.map(x=>x.phys),...c.conds.map(x=>x.psych)].join(' ').toLowerCase();
    const score=(blob.match(new RegExp(q,'g'))||[]).length;
    return{id:c.id,name:c.name,sub:`${c.eng} · ${c.gland}`,score,color:c.color};
  }).filter(r=>r.score>0).sort((a,b)=>b.score-a.score);
  const condRes=CONDITIONS.filter(c=>[c.name,...c.steps.map(s=>s.text)].join(' ').toLowerCase().includes(q)).map(c=>({type:'cond',id:c.id,name:c.name,sub:`Condition · ${c.cat}`,color:c.color}));
  const foodRes=FOODS.filter(f=>[f.name,f.effect,f.quality].join(' ').toLowerCase().includes(q)).map(f=>({type:'food',name:f.name,sub:`${f.quality} · ${f.vayu} Vayu`,color:f.color}));
  const all=[...res.slice(0,4),...condRes.slice(0,3),...foodRes.slice(0,3)];
  drop.innerHTML=all.length?all.map(r=>`<div class="sri" onclick="handleSearchClick('${r.type||'chakra'}','${r.id||r.name}')"><div class="srin"><span style="width:9px;height:9px;border-radius:50%;display:inline-block;background:${r.color}"></span>${r.name}</div><div class="srsub">${r.sub}</div></div>`).join(''):`<div style="padding:10px;font-size:11px;color:#4a6090">No results found</div>`;
  drop.style.display='block';
}

function handleSearchClick(type,id){
  document.getElementById('sdrop').style.display='none';document.getElementById('srch').value='';
  if(type==='chakra'){setMode('body');openDetail(id);}
  else if(type==='cond'){setMode('conditions');selectCond(id);}
  else if(type==='food'){setMode('foods');selectFood(id);}
}
document.addEventListener('click',e=>{if(!e.target.closest('#srch')&&!e.target.closest('#sdrop'))document.getElementById('sdrop').style.display='none';});

// ═══════════════════════════ JOURNEY MODE ══════════════════════════════════
function beginJourney(i){S.journey=JOURNEYS[i];S.jstep=0;document.getElementById('jov').classList.add('vis');renderJourneyStep();}
function renderJourneyStep(){
  const j=S.journey,step=j.steps[S.jstep],c=CK.find(x=>x.id===step.ck);
  document.getElementById('jprog').innerHTML=j.steps.map((_,i)=>`<div class="pdot ${i===S.jstep?'on':''}" style="${i===S.jstep?`background:${c.color};--jc:${c.color}`:``}"></div>`).join('');
  document.getElementById('jstep').textContent=`${j.title} · Step ${S.jstep+1} of ${j.steps.length}`;
  document.getElementById('jstep').style.color=c.color;
  document.getElementById('jtitle').textContent=step.title;
  document.getElementById('jtext').textContent=step.text;
  document.getElementById('jprev').style.display=S.jstep>0?'inline-block':'none';
  document.getElementById('jnext').textContent=S.jstep===j.steps.length-1?'Finish ✓':'Next →';
  document.getElementById('jcard').style.borderColor=c.color+'33';
  S.sel=step.ck;rebuildSVG();
}
function jNext(){if(S.jstep<S.journey.steps.length-1){S.jstep++;renderJourneyStep();}else closeJourney();}
function jPrev(){if(S.jstep>0){S.jstep--;renderJourneyStep();}}
function closeJourney(){document.getElementById('jov').classList.remove('vis');S.sel=null;rebuildSVG();}

// ═══════════════════════════════ INIT ══════════════════════════════════════
renderLeft();rebuildSVG();initP();tick();
</script>
